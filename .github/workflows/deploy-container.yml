name: Build and Deploy Container to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name nodejsoncounterdocker

      - name: Build image
        run: |
          docker build -t nodejsoncounterdocker.azurecr.io/node-app:latest .

      - name: Push image
        run: |
          docker push nodejsoncounterdocker.azurecr.io/node-app:latest

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME_C }}
          images: nodejsoncounterdocker.azurecr.io/node-app:latest